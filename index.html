<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Wellness Tracker</title>
<style>
:root{
  --bg:#eef2f5; --bg2:#f7f9fb; --card:#ffffff; --line:#e2e8ee; --line2:#d3dce4;
  --ink:#16242f; --ink2:#56697a; --ink3:#90a2b1;
  --accent:#0eb39a; --accent-d:#0a8f7c; --accent-bg:#e2f6f2;
  --blue:#2f78d6; --blue-bg:#e6f0fb;
  --cal:#0eb39a; --pro:#2bb673; --carb:#f0a821; --fat:#8b6cf0;
  --good:#2bb673; --warn:#e8833a; --bad:#e0566b;
  --radius:16px; --radius-sm:10px; --nav-h:62px;
  --shadow:0 1px 3px rgba(20,36,47,.06),0 4px 16px rgba(20,36,47,.06);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);font-size:16px;line-height:1.45;overflow-x:hidden}
main{padding-bottom:34px;min-height:100vh}
.page{display:none;max-width:780px;margin:0 auto;padding:14px 14px 30px}
.page.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* App bar (top) */
.appbar{position:sticky;top:0;z-index:40;background:var(--card);border-bottom:1px solid var(--line)}
.bar-top{display:flex;align-items:center;gap:10px;max-width:780px;margin:0 auto;padding:12px 16px 4px}
.bar-top h1{font-size:23px;font-weight:800;letter-spacing:-.5px;flex:1;cursor:pointer}
.bar-top h1 b{color:var(--accent)}
.icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2)}
.icon-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
nav.tabs{display:flex;max-width:780px;margin:0 auto;padding:2px 8px 6px}
nav.tabs button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;color:var(--ink3);font-size:10px;font-weight:700;font-family:var(--font);border-radius:10px}
nav.tabs button.active{color:var(--accent)}
nav.tabs button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

/* Dashboard (home) */
.hero{padding:8px 4px 14px}
.hero .greet{font-size:13px;color:var(--ink2);font-weight:600}
.hero h2{font-size:26px;font-weight:800;letter-spacing:-.5px;margin:1px 0 2px}
.hero .hdate{font-size:13px;color:var(--ink3);font-weight:600}
.dash{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:11px;box-shadow:var(--shadow);cursor:pointer}
.dash:active{transform:scale(.99)}
.dash .dicon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex:none}
.dash .dbody{flex:1;min-width:0}
.dash .dlabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3)}
.dash .dstat{font-size:19px;font-weight:800;margin-top:1px}
.dash .dstat small{font-size:13px;font-weight:600;color:var(--ink3)}
.dash .dsub{font-size:12px;color:var(--ink2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dash .dchev{color:var(--ink3);font-size:22px;font-weight:300}
.dbar{height:7px;border-radius:5px;background:var(--line);overflow:hidden;margin-top:7px}
.dbar>i{display:block;height:100%;border-radius:5px}
.streak{font-size:13px;font-weight:700;color:var(--warn)}
.vision{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;border-radius:var(--radius);padding:16px 18px;margin-bottom:11px;cursor:pointer;box-shadow:var(--shadow)}
.vision .vlabel{font-size:10px;font-weight:800;letter-spacing:1.2px;opacity:.85}
.vision .vtext{font-size:16px;font-weight:600;line-height:1.45;margin-top:5px;font-style:italic}
.vision .vtext.empty{opacity:.8;font-style:normal;font-weight:500}
.focusline .dstat{font-size:15px!important;font-weight:600!important;white-space:normal!important}
.watbtns{display:flex;gap:6px;margin-top:9px}
.watbtns button{flex:1;border:1px solid #bcd9f2;background:var(--blue-bg);color:var(--blue);font-weight:700;font-size:13px;font-family:var(--font);padding:7px 4px;border-radius:9px;cursor:pointer}
.watbtns button:active{transform:scale(.96)}
.watbtns button.minus{flex:0 0 42px;color:var(--ink2);background:var(--bg2);border-color:var(--line2)}
textarea.inp{resize:vertical;font-family:var(--font);line-height:1.45}

/* Cards & bits */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:12px;box-shadow:var(--shadow)}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink2);margin-bottom:11px;font-weight:700;display:flex;align-items:center;gap:7px}
.muted{color:var(--ink2)}.tiny{font-size:12px;color:var(--ink3)}
.row{display:flex;align-items:center;gap:10px}
.spacer{flex:1}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--accent-bg);color:var(--accent-d)}
.sel,.inp{font-family:var(--font);font-size:15px;color:var(--ink);background:var(--bg2);border:1px solid var(--line2);border-radius:var(--radius-sm);padding:10px 12px;width:100%}
.sel{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%2356697a' stroke-width='2'><path d='M4 6l4 4 4-4'/></svg>");background-repeat:no-repeat;background-position:right 12px center}
button.btn{font-family:var(--font);font-weight:700;font-size:14px;border:none;border-radius:var(--radius-sm);padding:11px 15px;cursor:pointer;background:var(--accent);color:#fff}
button.btn.sec{background:var(--bg2);color:var(--ink);border:1px solid var(--line2)}
button.btn.ghost{background:none;color:var(--accent-d);padding:8px 4px}
button.btn:active{transform:scale(.98)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
label.fld{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin:10px 0 4px}

/* Grocery */
.aisle{margin-bottom:6px}
.aisle .ah{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--accent-d);padding:12px 2px 4px}
.gitem{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line)}
.gitem:last-child{border-bottom:none}
.check{width:24px;height:24px;border-radius:7px;border:2px solid var(--line2);flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--card);transition:.12s}
.check svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;opacity:0}
.gitem.done .check{background:var(--accent);border-color:var(--accent)}
.gitem.done .check svg{opacity:1}
.gitem .gname{flex:1;font-weight:600;font-size:15px}
.gitem .gqty{font-size:13px;color:var(--ink2);font-weight:600;white-space:nowrap}
.gitem.done .gname,.gitem.done .gqty{color:var(--ink3);text-decoration:line-through}
.gitem .xrm{color:var(--ink3);cursor:pointer;font-size:18px;padding:0 4px}
.progress{height:9px;border-radius:6px;background:var(--line);overflow:hidden;margin-top:6px}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-d));border-radius:6px;transition:width .3s}
details.have{margin-top:8px}
details.have summary{cursor:pointer;font-size:13px;font-weight:700;color:var(--ink2);padding:8px 2px;list-style:none}
details.have summary::-webkit-details-marker{display:none}

/* Macro rings */
.rings{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center}
.ring{position:relative;width:100%;max-width:88px;margin:0 auto}
.ring svg{width:100%;height:auto;transform:rotate(-90deg)}
.ring .rv{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .rv b{font-size:15px;font-weight:800;line-height:1}
.ring .rv span{font-size:9px;color:var(--ink3);margin-top:1px}
.rlabel{font-size:11px;font-weight:700;color:var(--ink2);margin-top:5px}
.rrem{font-size:10px;color:var(--ink3)}

/* meal cards */
.meal{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
.meal:last-child{border-bottom:none}
.meal .mn{flex:1}
.meal .mn b{font-weight:700;font-size:14px}
.meal .mn .mm{font-size:12px;color:var(--ink2);margin-top:2px}
.meal.eaten .mn b{color:var(--accent-d)}

/* exercises */
.day{margin-bottom:10px}
.day .dh{display:flex;align-items:center;gap:10px;padding:10px 2px}
.day .dh b{flex:1;font-size:15px;font-weight:700}
.ex{display:flex;align-items:baseline;gap:8px;padding:7px 4px 7px 14px;font-size:14px;border-bottom:1px solid var(--line)}
.ex:last-child{border-bottom:none}
.ex a{color:var(--ink);text-decoration:none;font-weight:600;border-bottom:1px dotted var(--line2)}
.ex a:hover{color:var(--accent-d)}
.ex .sr{margin-left:auto;font-size:12px;color:var(--ink2);font-weight:600;white-space:nowrap}
.rest{padding:14px;text-align:center;color:var(--ink3);font-style:italic;font-size:13px}
.act{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
.act:last-child{border-bottom:none}
.act .aemoji{width:30px;text-align:center;font-size:17px}
.act .an{flex:1}.act .an b{font-size:14px;font-weight:700}.act .an .am{font-size:12px;color:var(--ink2)}
.act .astat{font-size:12px;color:var(--ink2);text-align:right;font-weight:600}

/* table */
.thist{width:100%;border-collapse:collapse;font-size:13px}
.thist th{text-align:right;padding:7px 8px;color:var(--ink2);font-weight:700;font-size:11px;border-bottom:2px solid var(--line);white-space:nowrap}
.thist th:first-child,.thist td:first-child{text-align:left}
.thist td{padding:8px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
.chartwrap{overflow:hidden;border-radius:var(--radius-sm)}
.seg{display:inline-flex;background:var(--bg2);border:1px solid var(--line2);border-radius:9px;overflow:hidden;margin-bottom:8px}
.seg button{border:none;background:none;padding:7px 13px;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer}
.seg button.on{background:var(--accent);color:#fff}

.banner{background:var(--blue-bg);border:1px solid #cfe1f6;color:#1c4f8f;border-radius:var(--radius-sm);padding:10px 13px;font-size:13px;font-weight:600;margin-bottom:12px}
.toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 18px);transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:200;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal{position:fixed;inset:0;background:rgba(20,36,47,.45);display:none;align-items:flex-end;justify-content:center;z-index:300}
.modal.show{display:flex}
.sheet{background:var(--card);width:100%;max-width:540px;border-radius:20px 20px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-height:86vh;overflow:auto;animation:up .22s ease}
@keyframes up{from{transform:translateY(30px)}to{transform:none}}
.sheet h3{font-size:17px;font-weight:800;margin-bottom:4px}
.searchres{padding:10px 4px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:10px;align-items:center}
.searchres:active{background:var(--bg2)}
.searchres .srn{flex:1}.searchres .srn b{font-size:14px}.searchres .srn span{font-size:12px;color:var(--ink2)}
.empty{text-align:center;color:var(--ink3);padding:26px 10px;font-size:14px}
.note{font-size:12px;color:var(--ink3);line-height:1.5;margin-top:8px}
a.link{color:var(--accent-d);font-weight:700;text-decoration:none}
</style>
</head>

  </nav>
</header>

<main>

  <section id="p-progress" class="page"></section>
  <section id="p-data" class="page"></section>
</main>

<div class="toast" id="toast"></div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()"><div class="sheet" id="sheet"></div></div>

/* ============================ STATE ============================ */
const LS_KEY = "mealprep_state_v1";
function defaultState(){
  return {
    plans: SEED_PLANS, workouts: SEED_WORKOUTS, pantry: SEED_PANTRY.slice(),
    currentPlanId: "p1655", currentWorkoutId: "w1",
    groceryRun: { planId:"p1655", extras:[], checked:{} },
    // personal (local-only)
    foodLog:{}, trainingLog:{}, checkins:[], activities:[], strava:{workerUrl:"",token:"",lastSync:0},
    vision:"", focus:{}, water:{}, profileName:"", waterGoal:126
  };
}
let S = load();
function load(){
  const d=defaultState();
  try{ const r=JSON.parse(localStorage.getItem(LS_KEY)); if(r) Object.assign(d,r); }catch(e){}
  // plans/workouts/pantry are code-defined (non-personal) — always use the latest from the app, not stale localStorage
  d.plans=SEED_PLANS; d.workouts=SEED_WORKOUTS; normalizePlans(d.plans);
  if(!d.plans.some(p=>p.id===d.currentPlanId)) d.currentPlanId=d.plans[0].id;
  if(!d.workouts.some(w=>w.id===d.currentWorkoutId)) d.currentWorkoutId=d.workouts[0].id;
  return d;
}
function save(){ const c=Object.assign({},S); delete c.plans; delete c.workouts; localStorage.setItem(LS_KEY, JSON.stringify(c)); }

const $=(s,r=document)=>r.querySelector(s);

const esc=(s)=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const todayISO=()=>new Date().toLocaleDateString('en-CA');
const slug=(n)=>n.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function enc(o){return btoa(unescape(encodeURIComponent(JSON.stringify(o))));}
function dec(s){return JSON.parse(decodeURIComponent(escape(atob(s))));}

function weekKey(d=new Date()){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-((t.getDay()+6)%7));const w1=new Date(t.getFullYear(),0,4);return t.getFullYear()+'-W'+String(1+Math.round(((t-w1)/864e5-3+((w1.getDay()+6)%7))/7)).padStart(2,'0');}

/* ----- meal macros + auto grocery (computed from meal items) ----- */
function mealRaw(m){
  let cal=0,P=0,C=0,F=0;
  (m.items||[]).forEach(it=>{ if(it.free||!it.cal) return; cal+=it.cal;
    const t=it.m||'C'; const has=c=>t.indexOf(c)>=0;
    const n=(has('P')?1:0)+(has('C')?1:0)+(has('F')?1:0)||1, per=it.cal/n;
    if(has('P'))P+=per; if(has('C'))C+=per; if(has('F'))F+=per; });
  return {cal, p:P/4, c:C/4, f:F/9};
}
function mealMacros(m){
  if(m._macros) return m._macros;
  const r=mealRaw(m); return {cal:Math.round(r.cal), p:Math.round(r.p), c:Math.round(r.c), f:Math.round(r.f)};
}
// Scale each plan's per-meal P/C/F so the day sums to the coach's stated target.
function normalizePlans(plans){
  plans.forEach(plan=>{
    const raws=plan.meals.map(mealRaw);
    let rp=0,rc=0,rf=0; raws.forEach(r=>{rp+=r.p;rc+=r.c;rf+=r.f;});
    const t=plan.target||{}, sp=(t.p&&rp)?t.p/rp:1, sc=(t.c&&rc)?t.c/rc:1, sf=(t.f&&rf)?t.f/rf:1;
    plan.meals.forEach((m,i)=>{ m._macros={cal:Math.round(raws[i].cal), p:Math.round(raws[i].p*sp), c:Math.round(raws[i].c*sc), f:Math.round(raws[i].f*sf)}; });
  });
}
function categorize(food){
  const f=food.toLowerCase(), has=arr=>arr.some(k=>f.includes(k));
  if(f.includes('green bean')||f.includes('potato')) return 'Produce';
  if(has(['collagen','ump','protein powder','ultimate muscle','provosyn','muscle provider','protein balls','creatine'])) return 'Supplements/Other';
  if(has(['chicken','turkey','salmon','mahi','beef','steak','sirloin','pork','tilapia','cod','shrimp','tuna','white fish','fish','sausage','ground'])) return 'Meat & Protein';
  if(has(['egg','yogurt','cottage cheese','feta','chedd','cheese','almond milk','coconut milk','heavy whipping','butter'])) return 'Dairy & Refrigerated';
  if(has(['bread','pita','tortilla','english muffin','ezekiel','bun','kodiak','pancake'])) return 'Bakery';
  if(has(['frozen','edamame'])) return 'Frozen';
  if(has(['oat','quinoa','rice','bean','chickpea','almond','walnut','cashew','pinenut','peanut','nut butter','tahini','chia','flax','hummus','kind bar','perfect bar','cracker','graham','cereal','fiber one','rice cake','salsa','teriyaki','jelly','honey','syrup','chocolate','coconut','seed','oil','dressing','vinaigrette','pumpkin puree','wild rice','kidney','oyster'])) return 'Grocery/Pantry';
  return 'Produce';
}
const FRAC={'½':.5,'⅓':1/3,'⅔':2/3,'¼':.25,'¾':.75,'⅛':.125};
function parseQty(q){
  if(!q) return {num:1,unit:'',explicit:false};
  q=q.trim();
  let m=q.match(/^(\d+(?:\.\d+)?)\s*([½⅓⅔¼¾⅛])?\s*(.*)$/);
  if(m && (m[1]||m[2])) return {num:(m[1]?parseFloat(m[1]):0)+(m[2]?FRAC[m[2]]:0), unit:m[3].trim(), explicit:true};
  let fm=q.match(/^([½⅓⅔¼¾⅛])\s*(.*)$/);
  if(fm) return {num:FRAC[fm[1]], unit:fm[2].trim(), explicit:true};
  return {num:1, unit:q, explicit:false};
}
function buildGroceries(plan){
  const days=plan.days||7, agg={};
  (plan.meals||[]).forEach(m=>(m.items||[]).forEach(it=>{
    if(it.free) return;
    const {num,unit,explicit}=parseQty(it.q), key=it.f.toLowerCase().trim();
    if(!agg[key]) agg[key]={item:it.f, num:0, unit, aisle:categorize(it.f), explicit};
    agg[key].num+=num; if(explicit) agg[key].explicit=true;
  }));
  return Object.values(agg).map(a=>{
    let qty='as needed';
    if(a.explicit){ const w=Math.round(a.num*days*100)/100; qty=a.unit?w+' '+a.unit:''+w; }
    return {item:a.item, qty, aisle:a.aisle};
  });
}
function planGroceries(p){ return p.groceries || buildGroceries(p); }

function go(pg){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $('#p-'+pg).classList.add('active');
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.pg===pg));
  window.scrollTo(0,0);
  ({home:renderHome,grocery:renderGrocery,food:renderFood,train:renderTrain,progress:renderProgress,data:renderData}[pg])();
}

/* ============================ HOME / DASHBOARD ============================ */
function renderHome(){
  const p=curPlan(), tg=p.target, today=todayISO(), tot=dayTotals(today);
  const calPct=tg.cal?Math.min(100,Math.round(tot.cal/tg.cal*100)):0;
  const mealsEaten=Object.keys((S.foodLog[today]||{mealsEaten:{}}).mealsEaten).length;
  const wk=weekKey(), wlog=S.trainingLog[wk]||{};
  const tDays=curWorkout().days.filter(d=>!d.rest), tDone=tDays.filter(d=>wlog[d.id]).length;
  const run=S.groceryRun, pantrySet=new Set(S.pantry.map(x=>x.toLowerCase()));
  const shop=[...planGroceries(p).map((g,i)=>({...g,key:'p'+i})),...(run.extras||[]).map((e,i)=>({...e,key:'e'+i}))].filter(g=>!(g.pantry||pantrySet.has(g.item.toLowerCase())));
  const left=shop.filter(g=>!run.checked[g.key]).length;
  const ck=[...S.checkins].sort((a,b)=>a.date<b.date?-1:1), last=ck[ck.length-1];
  let dueText='Add your first check-in';
  if(last){const d=Math.floor((Date.now()-new Date(last.date))/864e5),n=14-d; dueText=n<=0?'Check-in due now':'Next check-in in '+n+' days';}
  const lastAct=(S.activities||[])[0];
  const hr=new Date().getHours(), greetWord=hr<12?'Good morning':hr<18?'Good afternoon':'Good evening', emoji=hr<12?'☀️':hr<18?'🌤️':'🌙';
  const name=(S.profileName||'').trim();
  const dateStr=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const streak=vitalityStreak();
  const focusToday=(S.focus&&S.focus[today])||'';
  const ozToday=(S.water&&S.water[today])||0, wgoal=S.waterGoal||126, wpct=Math.min(100,Math.round(ozToday/wgoal*100));

  let html=`<div class="hero">
    <h2 onclick="editName()" style="cursor:pointer">${greetWord}${name?', '+esc(name):''} ${emoji}</h2>
    <div class="hdate">${dateStr}${streak>1?' &nbsp;·&nbsp; <span class="streak">🔥 '+streak+' day streak</span>':''}</div></div>`;

  // 2026 vision
  html+=`<div class="vision" onclick="editVision()"><div class="vlabel">${new Date().getFullYear()} VISION</div>
    <div class="vtext ${S.vision?'':'empty'}">${S.vision?esc(S.vision):'✨ Tap to set your vision for the year'}</div></div>`;

  // daily focus
  html+=`<div class="dash focusline" onclick="editFocus()"><div class="dicon" style="background:#fef0e4;color:var(--warn)">🎯</div>
    <div class="dbody"><div class="dlabel">Today's focus</div>
      <div class="dstat">${focusToday?esc(focusToday):'<span style="color:var(--ink3);font-weight:500">Set an intention for today</span>'}</div>
    </div><div class="dchev">✎</div></div>`;

  html+=`<div class="dash" onclick="go('food')"><div class="dicon" style="background:var(--accent-bg);color:var(--accent-d)">🍽️</div>
    <div class="dbody"><div class="dlabel">Nutrition</div>
      <div class="dstat">${round(tot.cal)} <small>/ ${tg.cal} cal</small></div>
      <div class="dbar"><i style="width:${calPct}%;background:var(--cal)"></i></div>
      <div class="dsub">${mealsEaten}/${p.meals.length} meals · ${round(tot.p)}P / ${round(tot.c)}C / ${round(tot.f)}F</div>
    </div><div class="dchev">›</div></div>`;

  html+=`<div class="dash" style="cursor:default"><div class="dicon" style="background:var(--blue-bg);color:var(--blue)">💧</div>
    <div class="dbody"><div class="dlabel">Water</div>
      <div class="dstat" onclick="logWaterExact()" style="cursor:pointer">${ozToday} <small>/ ${wgoal} oz</small></div>
      <div class="dbar"><i style="width:${wpct}%;background:var(--blue)"></i></div>
      <div class="watbtns">
        <button onclick="addWater(36)">+36</button>
        <button onclick="addWater(18)">+18</button>
        <button onclick="addWater(8)">+8</button>
        <button class="minus" onclick="addWater(-8)">−</button>
      </div>
    </div></div>`;

  const actLine=lastAct?`${actEmoji(lastAct.type)} ${esc(lastAct.name||lastAct.type)} · ${lastAct.durationMin} min`:'Connect Strava to see workouts';
  html+=`<div class="dash" onclick="go('train')"><div class="dicon" style="background:#eef0fb;color:var(--fat)">🏋️</div>
    <div class="dbody"><div class="dlabel">Training</div>
      <div class="dstat">${tDone}<small>/${tDays.length} workouts this week</small></div>
      <div class="dsub">${actLine}</div>
    </div><div class="dchev">›</div></div>`;

  html+=`<div class="dash" onclick="go('grocery')"><div class="dicon" style="background:#fdf1e3;color:var(--warn)">🛒</div>
    <div class="dbody"><div class="dlabel">Grocery</div>
      <div class="dstat">${left===0?'All set ✓':left+' <small>items to buy</small>'}</div>
      <div class="dsub">${esc(p.name)}</div>
    </div><div class="dchev">›</div></div>`;

  html+=`<div class="dash" onclick="go('progress')"><div class="dicon" style="background:#e9f5ee;color:var(--good)">📊</div>
    <div class="dbody"><div class="dlabel">Progress <span style="font-weight:600;text-transform:none;letter-spacing:0;color:var(--ink3)">· tap weight to log</span></div>
      <div class="dstat" onclick="event.stopPropagation();checkinModal()" style="cursor:pointer">${last?last.weightLbs+' <small>lb</small>':'＋ <small>log</small>'}</div>
      ${ck.length>=2?sparkHTML(ck):''}
      <div class="dsub">${dueText}</div>
    </div><div class="dchev">›</div></div>`;

  $('#p-home').innerHTML=html;
}
function sparkHTML(ck){
  const pts=ck.map(c=>c.weightLbs).filter(v=>v!=null); if(pts.length<2)return'';
  const W=260,H=32,mn=Math.min(...pts),mx=Math.max(...pts),rng=(mx-mn)||1;
  const x=i=>i*W/(pts.length-1), y=v=>H-2-((v-mn)/rng)*(H-4);
  const path=pts.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:30px;margin-top:6px;display:block"><path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" vector-effect="non-scaling-stroke"/></svg>`;
}
function vitalityStreak(){
  let n=0;
  for(let i=0;i<400;i++){
    const d=new Date(); d.setDate(d.getDate()-i); const iso=d.toLocaleDateString('en-CA');
    const fl=S.foodLog[iso];
    const wk=weekKey(d); const trained=S.trainingLog[wk]&&Object.keys(S.trainingLog[wk]).length;
    const active=(fl&&(Object.keys(fl.mealsEaten||{}).length||(fl.extras||[]).length)) || (S.water&&S.water[iso]) || trained;
    if(active) n++;
    else if(i===0) continue;   // today not logged yet — don't break the streak
    else break;
  }
  return n;
}

}

/* ============================ GROCERY ============================ */
function renderGrocery(){
  const p=curPlan(), run=S.groceryRun;
  if(run.planId!==p.id){ run.planId=p.id; run.checked={}; run.extras=run.extras||[]; }
  const all=[...planGroceries(p).map((g,i)=>({...g,key:'p'+i})), ...run.extras.map((e,i)=>({...e,key:'e'+i,extra:true}))];
  const pantrySet=new Set(S.pantry.map(x=>x.toLowerCase()));
  const isPantry=(g)=>g.pantry||pantrySet.has(g.item.toLowerCase());
  const shop=all.filter(g=>!isPantry(g)), have=all.filter(isPantry);
  const done=shop.filter(g=>run.checked[g.key]).length;
  const pct=shop.length?Math.round(done/shop.length*100):0;

  let html=`<div class="card">
    <div class="row"><div style="flex:1">
      <label class="fld" style="margin-top:0">This week's plan</label>
      <select class="sel" onchange="S.currentPlanId=this.value;save();renderGrocery()">
        ${S.plans.map(pl=>`<option value="${pl.id}" ${pl.id===p.id?'selected':''}>${esc(pl.name)}</option>`).join('')}
      </select>
    </div></div>
    <div class="row" style="margin-top:13px"><b style="font-size:14px">${done} / ${shop.length} in cart</b><span class="spacer"></span><span class="tiny">${pct}%</span></div>
    <div class="progress"><i style="width:${pct}%"></i></div>
  </div>`;

  // aisles
  html+='<div class="card">';
  AISLE_ORDER.forEach(aisle=>{
    const items=shop.filter(g=>g.aisle===aisle).sort((a,b)=>(run.checked[a.key]?1:0)-(run.checked[b.key]?1:0));
    if(!items.length) return;
    html+=`<div class="aisle"><div class="ah">${esc(aisle)}</div>`;
    items.forEach(g=>{
      const d=run.checked[g.key]?'done':'';
      html+=`<div class="gitem ${d}">
        <div class="check" onclick="toggleGrocery('${g.key}')"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
        <div class="gname" onclick="toggleGrocery('${g.key}')">${esc(g.item)}</div>
        <div class="gqty">${esc(g.qty||'')}</div>
        ${g.extra?`<div class="xrm" onclick="rmExtra('${g.key}')">×</div>`:''}
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';

  // add extra
  html+=`<div class="card"><h2>Add item</h2>
    <div class="row" style="gap:8px"><input class="inp" id="exItem" placeholder="e.g. Rotisserie chicken" style="flex:2">
      <input class="inp" id="exQty" placeholder="qty" style="flex:1"></div>
    <select class="sel" id="exAisle" style="margin-top:8px">${AISLE_ORDER.map(a=>`<option>${a}</option>`).join('')}</select>
    <button class="btn" style="margin-top:10px;width:100%" onclick="addExtra()">+ Add to list</button>
  </div>`;

  // have / pantry fold
  if(have.length){
    html+=`<details class="have card"><summary>✓ Already have (${have.length}) — pantry staples</summary><div style="margin-top:6px">`;
    have.forEach(g=>html+=`<div class="gitem"><div class="check" style="background:var(--line2);border-color:var(--line2)"><svg viewBox="0 0 24 24" style="opacity:1;stroke:#fff"><path d="M5 13l4 4L19 7"/></svg></div><div class="gname" style="color:var(--ink3)">${esc(g.item)}</div><div class="gqty">${esc(g.qty||'')}</div></div>`);
    html+=`</div></details>`;
  }

  html+=`<div class="row" style="gap:8px;margin-top:4px">
    <button class="btn sec" style="flex:1" onclick="openOnPhone()">📲 Open on phone</button>
    <button class="btn sec" style="flex:1" onclick="resetRun()">↺ New week</button>
  </div>`;
  $('#p-grocery').innerHTML=html;
}
function toggleGrocery(k){S.groceryRun.checked[k]=!S.groceryRun.checked[k];if(!S.groceryRun.checked[k])delete S.groceryRun.checked[k];save();renderGrocery();}
function addExtra(){const i=$('#exItem').value.trim();if(!i)return;S.groceryRun.extras.push({item:i,qty:$('#exQty').value.trim(),aisle:$('#exAisle').value});save();renderGrocery();}
function rmExtra(key){const idx=+key.slice(1);S.groceryRun.extras.splice(idx,1);
  // reindex checked keys for extras
  const nc={};Object.keys(S.groceryRun.checked).forEach(k=>{if(k[0]!=='e')nc[k]=true;else{const n=+k.slice(1);if(n<idx)nc[k]=true;else if(n>idx)nc['e'+(n-1)]=true;}});S.groceryRun.checked=nc;save();renderGrocery();}
function resetRun(){if(confirm('Start a fresh list for the new week? (clears checkmarks & extras)')){S.groceryRun={planId:S.currentPlanId,extras:[],checked:{}};save();renderGrocery();toast('Fresh list ready');}}
function openOnPhone(){
  const run={planId:S.groceryRun.planId,extras:S.groceryRun.extras,checked:S.groceryRun.checked};
  const url=location.origin+location.pathname+'#g='+enc(run);
  openModal(`<h3>Open on your phone</h3>
    <p class="muted" style="font-size:14px;margin:6px 0 12px">Open this link on your phone to load the same list. Check off as you shop.</p>
    <div style="background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:10px;font-size:12px;word-break:break-all">${esc(url)}</div>
    <button class="btn" style="width:100%;margin-top:10px" onclick="navigator.clipboard.writeText(${JSON.stringify(url)}).then(()=>toast('Link copied'))">Copy link</button>
    <button class="btn sec" style="width:100%;margin-top:8px" onclick="showQR(${JSON.stringify(url)})">Show QR code</button>
    <p class="note">The QR (optional) renders via a public QR image service and encodes only your grocery list — never any health data.</p>`);
}
function showQR(url){
  const img='https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=8&data='+encodeURIComponent(url);
  $('#sheet').insertAdjacentHTML('beforeend',`<div style="text-align:center;margin-top:12px"><img src="${img}" alt="QR" style="width:220px;height:220px;border:1px solid var(--line);border-radius:12px"></div>`);
}

/* ============================ FOOD ============================ */
let foodDate=todayISO();
function dayLog(d){ if(!S.foodLog[d])S.foodLog[d]={mealsEaten:{},extras:[]}; return S.foodLog[d]; }
function dayTotals(d){
  const p=curPlan(),lg=S.foodLog[d]||{mealsEaten:{},extras:[]};const t={cal:0,p:0,c:0,f:0};
  p.meals.forEach(m=>{if(lg.mealsEaten[m.id]){const mm=mealMacros(m);t.cal+=mm.cal;t.p+=mm.p;t.c+=mm.c;t.f+=mm.f;}});
  (lg.extras||[]).forEach(e=>{t.cal+=e.cal||0;t.p+=e.p||0;t.c+=e.c||0;t.f+=e.f||0;});
  return t;
}
function renderFood(){
  const p=curPlan(),tg=p.target,lg=dayLog(foodDate),tot=dayTotals(foodDate);
  const isToday=foodDate===todayISO();
  let html=`<div class="card">
    <div class="row"><div style="flex:1">
      <label class="fld" style="margin-top:0">Day</label>
      <input class="inp" type="date" value="${foodDate}" max="${todayISO()}" onchange="foodDate=this.value;renderFood()">
    </div><div style="text-align:right"><div class="tiny">Target</div><b style="font-size:14px">${tg.cal} cal</b></div></div>
    <div class="rings" style="margin-top:16px">
      ${ringHTML('Calories',tot.cal,tg.cal,'var(--cal)','')}
      ${ringHTML('Protein',tot.p,tg.p,'var(--pro)','g')}
      ${ringHTML('Carbs',tot.c,tg.c,'var(--carb)','g')}
      ${ringHTML('Fat',tot.f,tg.f,'var(--fat)','g')}
    </div></div>`;

  html+=`<div class="card"><h2>Plan meals${isToday?' · today':''}</h2>`;
  p.meals.forEach(m=>{
    const eaten=lg.mealsEaten[m.id]?'eaten':'';
    html+=`<div class="meal ${eaten}">
      <div class="check ${eaten?'':''}" onclick="toggleMeal('${m.id}')" style="${eaten?'background:var(--accent);border-color:var(--accent)':''}"><svg viewBox="0 0 24 24" style="${eaten?'opacity:1':''}"><path d="M5 13l4 4L19 7"/></svg></div>
      <div class="mn" onclick="toggleMeal('${m.id}')"><b>${esc(m.name)}</b><div class="mm">${mealMacros(m).cal} cal · ${mealMacros(m).p}P / ${mealMacros(m).c}C / ${mealMacros(m).f}F</div></div>
    </div>`;
  });
  html+='</div>';

  html+=`<div class="card"><h2>Off-plan / extras</h2>`;
  if((lg.extras||[]).length){
    lg.extras.forEach((e,i)=>html+=`<div class="meal"><div class="mn"><b>${esc(e.name)}</b><div class="mm">${e.cal||0} cal · ${e.p||0}P / ${e.c||0}C / ${e.f||0}F</div></div><div class="xrm" style="font-size:20px;color:var(--ink3);cursor:pointer" onclick="rmFoodExtra(${i})">×</div></div>`);
  } else html+=`<div class="tiny" style="padding:4px 2px 10px">Nothing logged off-plan.</div>`;
  html+=`<div class="row" style="gap:8px;margin-top:8px">
    <button class="btn sec" style="flex:1" onclick="searchFoodModal()">🔍 Search food</button>
    <button class="btn sec" style="flex:1" onclick="customFoodModal()">＋ Custom</button>
  </div></div>`;

  // 7-day strip
  html+=`<div class="card"><h2>Last 7 days</h2><div class="row" style="gap:6px;justify-content:space-between">`;
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);const iso=d.toLocaleDateString('en-CA');
    const t=dayTotals(iso),has=S.foodLog[iso]&&(Object.keys(S.foodLog[iso].mealsEaten).length||S.foodLog[iso].extras.length);
    const ratio=tg.cal?t.cal/tg.cal:0;
    let col=has?(ratio>=.9&&ratio<=1.1?'var(--good)':ratio<.9?'var(--carb)':'var(--warn)'):'var(--line)';
    html+=`<div style="flex:1;text-align:center;cursor:pointer" onclick="foodDate='${iso}';renderFood()">
      <div style="height:34px;display:flex;align-items:flex-end;justify-content:center"><div style="width:60%;border-radius:5px 5px 0 0;background:${col};height:${has?Math.max(12,Math.min(34,ratio*34)):4}px"></div></div>
      <div class="tiny" style="margin-top:3px">${'SMTWTFS'[d.getDay()]}</div></div>`;
  }
  html+=`</div></div>`;
  $('#p-food').innerHTML=html;
}
function ringHTML(label,val,target,color,unit){
  const r=26,c=2*Math.PI*r,pct=target?Math.min(1,val/target):0;
  return `<div><div class="ring"><svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="${r}" stroke="var(--line)" stroke-width="7" fill="none"/>
    <circle cx="32" cy="32" r="${r}" stroke="${color}" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct)}"/></svg>
    <div class="rv"><b>${round(val)}</b><span>/${target}${unit}</span></div></div>
    <div class="rlabel">${label}</div><div class="rrem">${Math.max(0,round(target-val))}${unit} left</div></div>`;
}
function toggleMeal(id){const lg=dayLog(foodDate);lg.mealsEaten[id]=!lg.mealsEaten[id];if(!lg.mealsEaten[id])delete lg.mealsEaten[id];save();renderFood();}
function rmFoodExtra(i){dayLog(foodDate).extras.splice(i,1);save();renderFood();}

function searchFoodModal(){

async function runFoodSearch(){

  try{
    const u='https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+'&search_simple=1&action=process&json=1&page_size=10&fields=product_name,brands,serving_size,nutriments';
    const r=await fetch(u);const j=await r.json();

    }).join('');

      <b>${esc(d.label)}</b></div>`;
    d.exercises.forEach(ex=>{
      html+=`<div class="ex"><a href="https://julielohre.com/?s=${encodeURIComponent(ex.name)}" target="_blank" rel="noopener">${esc(ex.name)}</a><span class="sr">${esc(ex.reps)} reps</span></div>`;
    });

      const wkAgo=Date.now()-7*864e5;const recent=S.activities.filter(a=>new Date(a.date).getTime()>wkAgo);

function toggleDay(id){const wk=weekKey();S.trainingLog[wk]=S.trainingLog[wk]||{};S.trainingLog[wk][id]=!S.trainingLog[wk][id];if(!S.trainingLog[wk][id])delete S.trainingLog[wk][id];save();renderTrain();}
function actEmoji(t){t=(t||'').toLowerCase();if(t.includes('run'))return'🏃';if(t.includes('ride')||t.includes('cycl')||t.includes('bike'))return'🚴';if(t.includes('swim'))return'🏊';if(t.includes('walk')||t.includes('hike'))return'🚶';if(t.includes('weight')||t.includes('strength')||t.includes('workout'))return'🏋️';if(t.includes('yoga'))return'🧘';return'💪';}
function timeAgo(ts){const s=(Date.now()-ts)/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
async function syncStrava(){
  if(!S.strava.workerUrl||!S.strava.token){toast('Connect Strava first');return;}
  toast('Syncing…');
  try{
    const after=Math.floor((Date.now()-30*864e5)/1000);

    const j=await r.json();S.activities=j.activities||[];S.strava.lastSync=Date.now();save();renderTrain();toast('Synced '+S.activities.length+' activities');

    hshow.forEach(c=>{

    if(hrev.length>1) html+=`<button class="btn ghost" style="margin-top:6px" onclick="histOpen=!histOpen;renderProgress()">${histOpen?'Show less ▲':'Show all '+hrev.length+' check-ins ▾'}</button>`;

    // Fitness tests (every 4 weeks)
    const fts=ck.filter(c=>c.fitTest);

      const fa=fts[0].fitTest, fz=fts[fts.length-1].fitTest;

          <div><div class="tiny">Plank</div><b style="font-size:18px">${fz.plankHold??'—'}${arrow(parseTime(fa.plankHold),parseTime(fz.plankHold),false)}</b></div>

function fmtDate(iso){const[y,m,d]=iso.split('-');return `${+m}/${+d}/${y.slice(2)}`;}
function parseTime(s){ if(s==null)return null; s=String(s); if(s.includes(':')){const p=s.split(':');return (+p[0])*60+(+p[1]);} const m=s.match(/(\d+(\.\d+)?)/); return m?+m[1]:null; }
function getMetric(c,key){if(key==='weightLbs')return c.weightLbs;if(key==='waist')return c.measurements?.waist;if(key==='restingHR')return c.fitTest?.restingHR;return null;}
function trendSVG(ck,key){
  const pts=ck.map(c=>({d:c.date,v:getMetric(c,key)})).filter(p=>p.v!=null);
  if(pts.length<2)return `<div class="empty">Not enough data for this metric yet.</div>`;
  const W=700,H=200,pad=34;const vs=pts.map(p=>p.v);let mn=Math.min(...vs),mx=Math.max(...vs);if(mn===mx){mn-=1;mx+=1;}const rng=mx-mn;
  const x=i=>pad+i*(W-2*pad)/(pts.length-1);const y=v=>H-pad-((v-mn)/rng)*(H-2*pad);
  const col=key==='restingHR'?'var(--fat)':key==='waist'?'var(--carb)':'var(--accent)';
  let path=pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(p.v).toFixed(1)).join(' ');
  let area=path+` L${x(pts.length-1)} ${H-pad} L${x(0)} ${H-pad} Z`;
  let dots=pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="3" fill="${col}"/>`).join('');
  const lblFirst=fmtDate(pts[0].d),lblLast=fmtDate(pts[pts.length-1].d);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;background:var(--bg2);border-radius:10px">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".18"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#g)"/><path d="${path}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round"/>${dots}
    <text x="${pad}" y="${H-10}" font-size="12" fill="#90a2b1">${lblFirst}</text>
    <text x="${W-pad}" y="${H-10}" font-size="12" fill="#90a2b1" text-anchor="end">${lblLast}</text>
    <text x="${pad}" y="20" font-size="12" fill="#90a2b1">${round(mx,1)}</text>
    <text x="${pad}" y="${H-pad+2}" font-size="12" fill="#90a2b1">${round(mn,1)}</text></svg>`;
}
function checkinDue(ck){
  if(!ck.length)return false;const last=new Date(ck[ck.length-1].date);const days=(Date.now()-last)/864e5;return days>=14;
}

function importFile(e){
  const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{
    const j=JSON.parse(rd.result);
    if(j.checkins)S.checkins=j.checkins;
    if(j.foodLog)S.foodLog=Object.assign(S.foodLog,j.foodLog);
    if(j.activities)S.activities=j.activities;
    if(j.trainingLog)S.trainingLog=Object.assign(S.trainingLog,j.trainingLog);
    if(j.strava)S.strava=Object.assign(S.strava,j.strava);
    if(j.groceryRun)S.groceryRun=j.groceryRun;
    if(j.vision)S.vision=j.vision;
    if(j.focus)S.focus=Object.assign(S.focus||{},j.focus);
    if(j.water)S.water=Object.assign(S.water||{},j.water);
    if(j.profileName)S.profileName=j.profileName;
    if(j.waterGoal)S.waterGoal=j.waterGoal;
    save();renderData();toast('Imported '+(j.checkins?j.checkins.length+' check-ins':'data'));
  }catch(err){toast('Could not read file');}};
  rd.readAsText(f);
}
function saveStrava(){S.strava.workerUrl=$('#stUrl').value.trim();S.strava.token=$('#stTok').value.trim();save();
  if(S.strava.workerUrl&&S.strava.token)syncStrava();else toast('Saved');}
function exportBackup(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='prep-progress-backup-'+todayISO()+'.json';a.click();toast('Backup downloaded');
}
function resetAll(){if(confirm('Clear all data on THIS device? (Your backup/export and other devices are untouched.)')){localStorage.removeItem(LS_KEY);S=defaultState();save();renderData();toast('Device reset');}}

/* ============================ MODAL ============================ */
function openModal(html){$('#sheet').innerHTML=html;$('#modal').classList.add('show');}
function closeModal(){$('#modal').classList.remove('show');}

/* ============================ BOOT ============================ */
function boot(){
  // grocery handoff via #g=
  if(location.hash.startsWith('#g=')){
    try{const run=dec(location.hash.slice(3));S.groceryRun=run;save();history.replaceState(null,'',location.pathname);toast('Grocery list loaded');go('grocery');return;}catch(e){}
  }
  go('home');
}
boot();
</script>
